<html xmlns:th="http://www.thymeleaf.org" xmlns:type="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Politician-Party</title>
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>

<div th:if="${error}" class="error-message">
    <p th:text="${error}"></p>
</div>

<div class="landing-container">
    <h1>Politician-Party</h1>
    <div id="score" th:text="'Punktzahl: ' + ${score}"></div>
    <div th:if="${gameOverParty}" class="gameOverDisplay">
        <p th:text="'Leider Falsch! ' + ${gameOverPoliticianName} + ' ' + ${gameOverPoliticianSurname} + ' ist in der Partei ' + ${gameOverParty} + '.'"></p>
    </div>
    <div class="buttons">
        <form th:action="@{/quiz/start}" method="post">
            <button class="startQuiz" type:"submit">
            <span>Quiz starten</span>
            </button>
        </form>
    </div>
</div>

</body>
</html>
