<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Politician-Party</title>
    <link rel="stylesheet" href="/css/quiz.css">
</head>
<body>

<div th:if="${error}" class="error-message">
    <p th:text="${error}"></p>
</div>

<div class="landing-container">
    <div id="score" th:text="'Punktzahl: ' + ${score}"></div>
    <div><img id="politician-image" th:src="@{'/images/' + ${politician.imagePath}}" alt="Politikerbild" /></div>
    <div class="politician-name">
        <h2 class="random-polititian"
                  th:text="${politician.name} + ' ' + ${politician.surname}">
        </h2>
    </div>
    <div class="button-container">
        <form th:action="@{/quiz/answer}" method="post">
            <div id="party-button" class="quiz-buttons">
                <button class="quiz-button"
                    type="submit"
                    name="selectedParty"
                    th:each="partyName : ${quizParties}"
                    th:value="${partyName}"
                    th:text="${partyName}">
                </button>
            </div>
        </form>
        <br>
        <div class="returnToIndex">
            <button class="button" type="button" onclick="window.location.href='/'">
                <span>Zur Startseite zurück</span>
            </button>
        </div>
    </div>
</div>


</body>
</html>
